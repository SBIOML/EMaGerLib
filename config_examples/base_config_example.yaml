# ===== Paths =====
BASE_PATH: "./Datasets/"
SESSION: "D1"
MEDIA_PATH: "./media-test/"
MODEL_NAME: null  # Set to null for auto-detection or specify model filename

# ===== Gesture/classes configuration =====
# hand_close, hand_open, index extension, ok, thumbs up
CLASSES: [2, 3, 30, 14, 18]
NUM_CLASSES: 5
NUM_REPS: 5
REP_TIME: 5
REST_TIME: 1

# ===== Data acquisition and model parameters =====
MAJORITY_VOTE: 30
WINDOW_SIZE: 200
WINDOW_INCREMENT: 10
EPOCH: 10
SAMPLING: 1008
FILTER: false
VIRTUAL: false
PORT: null
EMAGER_VERSION: "v3.0"  # EMaGer device version ("v1.0", "v1.1", or "v3.0")

# ===== Controller and predictor settings =====
USE_GUI: false
POLL_SLEEP_DELAY: 0.001  # Sleep time to prevent busy waiting when polling for data
PREDICTOR_DELAY: 0.01  # Changes the precision of frequency of predictions
PREDICTOR_TIMEOUT_DELAY: 0.50  # Timeout for waiting for new predictions
SMOOTH_WINDOW: 1  # Set to 1 to disable smoothing (always use latest value)
SMOOTH_METHOD: 'mode'  # 'mode' recommended for categorical gestures; 'mean' for numeric smoothing
HEARTBEAT_INTERVAL: 0.1  # Heartbeat interval (seconds) for re-sending the last gesture

# ===== Logging configuration =====
LOG_LEVEL: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
LOG_TO_FILE: false  # Set to true to enable file logging by default
LOG_FILE_PATH: null  # Path to log file, or null for auto-generated name
LOG_FILE_NAME: null  # Custom log file name, or null for auto-generated name

# ===== Config saving defaults =====
SAVE_CONFIG_PATH: null  # Path to save config file, or null for default location
SAVE_CONFIG_NAME: null  # Custom config file name, or null for auto-generated name
SAVE_CONFIG_FORMAT: "json"  # json or yaml
